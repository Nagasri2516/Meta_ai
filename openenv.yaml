spec_version: 1

name: smart_waste_env
description: RL environment for smart waste collection optimization

type: space
runtime: fastapi
port: 8000

grader: smart_waste_env.grader.grade

tasks:
  - name: easy
    description: Few bins, fixed positions
    entrypoint: smart_waste_env.tasks.easy_task  # Full path to the function
  
  - name: medium
    description: Random bins, moderate difficulty
    entrypoint: smart_waste_env.tasks.medium_task  # Full path to the function
  
  - name: hard
    description: Many bins, high difficulty
    entrypoint: smart_waste_env.tasks.hard_task  # Full path to the function

entrypoint: inference.py